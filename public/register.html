<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rekisteröidy | Webbom</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-simple auth-layout">
        <a class="auth-back-link" href="/webbom">Takaisin pääsivulle</a>
        <p class="eyebrow">Webbom</p>
        <h1>Luo tili</h1>
        <p class="lede">Perusta työtila ja aloita yrityksen tiedoista.</p>

        <form id="register-form" class="stack-form auth-card auth-panel">
          <label>
            <span>Työtilan nimi</span>
            <input name="agencyName" placeholder="Northbound Growth" required />
          </label>
          <label>
            <span>Sähköposti</span>
            <input name="email" type="email" placeholder="owner@example.com" required />
          </label>
          <label>
            <span>Salasana</span>
            <input name="password" type="password" placeholder="Vähintään 8 merkkiä" required />
          </label>
          <button type="submit">Luo tili</button>
        </form>

        <p id="status-banner" class="auth-status" aria-live="polite"></p>

        <p class="auth-link-row">
          Onko jo tili?
          <a href="/login">Kirjaudu</a>
        </p>
      </section>
    </main>

    <script type="module" src="/register.js"></script>
  </body>
</html>
