<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumix Workflow</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="guided-dashboard-body">
    <main class="guided-workflow">
      <aside class="guided-progress" aria-label="Workflow progress">
        <a href="/" class="guided-brand" aria-label="Lumix home">
          <span class="guided-brand-mark" aria-hidden="true"></span>
          <span class="guided-brand-name">Lumix</span>
        </a>

        <div id="guided-step-list" class="guided-step-list"></div>
      </aside>

      <section class="guided-workspace">
        <header class="guided-topbar">
          <div class="guided-topbar-copy">
            <span class="guided-kicker" id="guided-kicker">Guided workflow</span>
            <h1 id="guided-workspace-name">Lumix Workspace</h1>
          </div>

          <div class="guided-topbar-actions">
            <div class="guided-lang-switch" aria-label="Language switcher">
              <a href="/dashboard?lang=en" class="guided-lang-button" data-lang-button="en">EN</a>
              <a href="/dashboard?lang=fi" class="guided-lang-button" data-lang-button="fi">FI</a>
            </div>
            <button id="guided-new-website" class="guided-secondary-button" type="button">New website</button>
            <label class="guided-client-select-wrap" aria-label="Select active client">
              <span id="guided-client-label">Client</span>
              <select id="guided-client-switcher"></select>
            </label>
            <button id="guided-logout" class="guided-topbar-link" type="button">Log out</button>
          </div>
        </header>

        <p id="guided-status" class="guided-status" aria-live="polite"></p>

        <section id="guided-main" class="guided-main" aria-live="polite"></section>
      </section>
    </main>

    <script type="module" src="/dashboard.js"></script>
  </body>
</html>
